name: Publish to npm (with provenance)

# Publishes n8n-nodes-sendseven to npm with an npm provenance statement.
# Triggered by pushing a version tag, e.g. `git tag v1.2.4 && git push --tags`.
#
# Requirements:
#   - Repository secret NPM_TOKEN: an npm Automation (or granular publish) token.
#   - permissions.id-token: write — required so the runner can mint the OIDC
#     token npm uses to generate the provenance statement.
#   - package.json repository.url must exactly match this repo (case-sensitive).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
